services:

- type: web
  name: ollama-rag-api
  env: python
  buildCommand: pip install -r backend/requirements.txt
  startCommand: uvicorn backend.api:app --host 0.0.0.0 --port 10000


- type: web
  name: ollama-rag-react
  env: static
  buildCommand: |
    cd frontend
    npm install
    npm run build

  staticPublishPath: frontend/dist